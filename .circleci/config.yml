version: 2.1

jobs:
  test-and-build:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/project
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-node-deps-{{ checksum "package-lock.json" }}
            - v1-node-deps-

      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          key: v1-node-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: Run tests
          command: npm test

      - run:
          name: Build application
          command: npm run build

      - persist_to_workspace:
          root: .
          paths:
            - .

  docker-build-and-push:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - attach_workspace:
          at: ~/project

      - setup_remote_docker

      - run:
          name: Compute image tag
          command: |
            echo 'export IMAGE_TAG=$(echo "$CIRCLE_SHA1" | cut -c1-7)' >> "$BASH_ENV"
            source "$BASH_ENV"
            echo "IMAGE_TAG=$IMAGE_TAG"

      - run:
          name: Docker login
          command: |
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - run:
          name: Build Docker image
          command: |
            source "$BASH_ENV"
            docker build -t docker.io/$DOCKERHUB_USERNAME/todo-api:$IMAGE_TAG .
            docker tag docker.io/$DOCKERHUB_USERNAME/todo-api:$IMAGE_TAG docker.io/$DOCKERHUB_USERNAME/todo-api:dev

      - run:
          name: Push Docker image
          command: |
            source "$BASH_ENV"
            docker push docker.io/$DOCKERHUB_USERNAME/todo-api:$IMAGE_TAG
            docker push docker.io/$DOCKERHUB_USERNAME/todo-api:dev

  update-infra-manifests:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project
    steps:
      - checkout

      - run:
          name: Install git
          command: |
            sudo apt-get update
            sudo apt-get install -y git

      - run:
          name: Compute image tag
          command: |
            echo 'export IMAGE_TAG=$(echo "$CIRCLE_SHA1" | cut -c1-7)' >> "$BASH_ENV"
            source "$BASH_ENV"
            echo "IMAGE_TAG=$IMAGE_TAG"

      - run:
          name: Clone infra-manifests repository
          command: |
            git clone https://$GITHUB_USER:$GITHUB_TOKEN@github.com/$GITHUB_USER/infra-manifests.git
            cd infra-manifests
            git checkout main

      - run:
          name: Update todo-api image tag in overlays/dev/kustomization.yaml
          command: |
            source "$BASH_ENV"
            cp .circleci/scripts/update_infra_tag.py infra-manifests/update_infra_tag.py
            cd infra-manifests
            python3 update_infra_tag.py

      - run:
          name: Commit and push changes
          command: |
            source "$BASH_ENV"
            cd infra-manifests

            if git diff --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git config user.name "$GITHUB_USER"
            git config user.email "$GITHUB_EMAIL"

            git add overlays/dev/kustomization.yaml
            git commit -m "chore: update todo-api image tag to $IMAGE_TAG"
            git push origin main

workflows:
  todo-api-ci:
    jobs:
      - test-and-build

      - docker-build-and-push:
          context:
            - dockerhub
          requires:
            - test-and-build
          filters:
            branches:
              only:
                - main

      - update-infra-manifests:
          context:
            - dockerhub
          requires:
            - docker-build-and-push
          filters:
            branches:
              only:
                - main
